<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Buildings Tiles Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script>
      // Bounds from your GeoJSON
      const minLon = -87.6477143;
      const minLat = 41.8722748;
      const maxLon = -87.6186789;
      const maxLat = 41.8955858;

      const centerLat = (minLat + maxLat) / 2;
      const centerLon = (minLon + maxLon) / 2;

      const z = 16;
      const tileSize = 256; // ✅ matches your PNGs

      const map = L.map("map", {
        center: [centerLat, centerLon],
        zoom: z,
      });

      // Base OSM layer (keep visible for sanity check)
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors",
        opacity: 0.6,
      }).addTo(map);

      // Transparent tile for missing custom tiles
      const emptyTile = "data:image/gif;base64,R0lGODlhAQABAAAAACw=";

      // Custom buildings tiles
      const buildingsLayer = L.tileLayer(
        // path is relative to backend/index.html → backend/data/...
        "data/served/baselayer-0_buildings_raster/{z}_{x}_{y}.png",
        {
          tileSize: tileSize,
          minZoom: z,
          maxZoom: z,
          noWrap: true,
          opacity: 1,
          zIndex: 1000,
          errorTileUrl: emptyTile,
        }
      ).addTo(map);

      // Log which tiles work / fail
      buildingsLayer.on("tileload", (e) => {
        console.log("✅ Loaded:", e.coords, e.tile.src);
      });

      buildingsLayer.on("tileerror", (e) => {
        console.warn("❌ Failed:", e.coords, "→", e.tile.src);
      });

      // Focus on your AOI
      map.fitBounds([
        [minLat, minLon],
        [maxLat, maxLon],
      ]);
    </script>
  </body>
</html>
