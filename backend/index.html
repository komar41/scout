      projection.fitSize([width, height], fc);

      g.selectAll("path")
        .data(fc.features)
        .enter()
        .append("path")
        .attr("class", "geom")
        .attr("d", path)
        .append("title")
        .text((d) => d.properties.name);

      const zoom = d3
        .zoom()
        .scaleExtent([1, 20])
        .on("zoom", (event) => g.attr("transform", event.transform));
      svg.call(zoom);
    </script>
  </body>
</html>
