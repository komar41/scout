<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D3 — Buildings (EPSG:4326)</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      svg {
        width: 100%;
        height: 100%;
        background: #fafafa;
      }
      .bldg {
        fill: #6aa9ff;
        fill-opacity: 0.65;
        stroke: #333;
        stroke-width: 0.8;
        fill-rule: evenodd;
      }
    </style>
  </head>
  <body>
    <svg id="map"></svg>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
      // Your buildings (lon, lat) in EPSG:4326
      const b1 = {
        type: "Polygon",
        coordinates: [
          [
            [-87.624397277832031, 41.870140075683594],
            [-87.625236511230469, 41.870121002197266],
            [-87.625251770019531, 41.8704833984375],
            [-87.625198364257812, 41.870487213134766],
            [-87.6251220703125, 41.870487213134766],
            [-87.624626159667969, 41.870498657226562],
            [-87.624404907226562, 41.870502471923828],
            [-87.624404907226562, 41.870464324951172],
            [-87.624404907226562, 41.870346069335938],
            [-87.624404907226562, 41.8702392578125],
            [-87.624397277832031, 41.870140075683594],
          ],
        ],
      };

      // Polygon with a hole
      const b2 = {
        type: "Polygon",
        coordinates: [
          [
            // outer ring
            [-87.635932922363281, 41.89093017578125],
            [-87.635948181152344, 41.89093017578125],
            [-87.635948181152344, 41.890869140625],
            [-87.636039733886719, 41.890869140625],
            [-87.636856079101562, 41.890861511230469],
            [-87.636863708496094, 41.891017913818359],
            [-87.636871337890625, 41.891441345214844],
            [-87.635704040527344, 41.891456604003906],
            [-87.635696411132812, 41.891033172607422],
            [-87.635841369628906, 41.891033172607422],
            [-87.635833740234375, 41.890998840332031],
            [-87.635940551757812, 41.890995025634766],
            [-87.635932922363281, 41.890960693359375],
            [-87.635932922363281, 41.89093017578125],
          ],
        ],
      };

      const b3 = {
        type: "Polygon",
        coordinates: [
          [
            [-87.641525268554688, 41.885658264160156],
            [-87.642425537109375, 41.885654449462891],
            [-87.642425537109375, 41.885646820068359],
            [-87.642425537109375, 41.885635375976562],
            [-87.642478942871094, 41.885635375976562],
            [-87.642478942871094, 41.885654449462891],
            [-87.642555236816406, 41.885654449462891],
            [-87.642555236816406, 41.885692596435547],
            [-87.641502113494454, 41.88569630461626],
            [-87.641471862792969, 41.885696411132812],
            [-87.641471862792969, 41.885746002197266],
            [-87.642555236816406, 41.885749816894531],
            [-87.642555236816406, 41.885787963867188],
            [-87.642478942871094, 41.885787963867188],
            [-87.642478942871094, 41.885807037353516],
            [-87.642433166503906, 41.885807037353516],
            [-87.642433166503906, 41.885795593261719],
            [-87.642433166503906, 41.885784149169922],
            [-87.641525268554688, 41.885787963867188],
            [-87.641525268554688, 41.885799407958984],
            [-87.641525268554688, 41.885810852050781],
            [-87.641426086425781, 41.885810852050781],
            [-87.641281127929688, 41.885810852050781],
            [-87.641281127929688, 41.885787963867188],
            [-87.641128540039062, 41.885787963867188],
            [-87.641128540039062, 41.885749816894531],
            [-87.641128540039062, 41.885662078857422],
            [-87.64117431640625, 41.885662078857422],
            [-87.64117431640625, 41.885623931884766],
            [-87.641220092773438, 41.885623931884766],
            [-87.641410827636719, 41.885623931884766],
            [-87.641433715820312, 41.885623931884766],
            [-87.641433715820312, 41.885635375976562],
            [-87.641525268554688, 41.885635375976562],
            [-87.641525268554688, 41.885646820068359],
            [-87.641525268554688, 41.885658264160156],
          ],
        ],
      };

      const b4 = {
        type: "Polygon",
        coordinates: [
          [-87.622589111328125, 41.898590087890625], // SE (start)
          [-87.622589111328125, 41.899059295654297], // NE
          [-87.62359619140625, 41.8990478515625], // NW
          [-87.623588562011719, 41.898574829101562], // SW
          [-87.622589111328125, 41.898590087890625],
        ],
      };

      const fc = {
        type: "FeatureCollection",
        features: [
          { type: "Feature", properties: { name: "Building 1" }, geometry: b1 },
          {
            type: "Feature",
            properties: { name: "Building 2 (hole)" },
            geometry: b2,
          },
          { type: "Feature", properties: { name: "Building 3" }, geometry: b3 },
          // { type: "Feature", properties: { name: "Building 4" }, geometry: b4 },
        ],
      };

      const svg = d3.select("#map");
      const width = svg.node().clientWidth || 800;
      const height = svg.node().clientHeight || 600;

      const g = svg.append("g");
      const projection = d3.geoMercator();
      const path = d3.geoPath().projection(projection);

      // Fit to all buildings
      projection.fitSize([width, height], fc);

      // Draw
      g.selectAll("path")
        .data(fc.features)
        .enter()
        .append("path")
        .attr("class", "bldg")
        .attr("d", path)
        .append("title")
        .text((d) => d.properties.name);

      // Zoom/Pan
      const zoom = d3
        .zoom()
        .scaleExtent([1, 20])
        .on("zoom", (event) => g.attr("transform", event.transform));
      svg.call(zoom);
    </script>
  </body>
</html>
